<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="tulipGrad" x1="10%" y1="100%" x2="90%" y2="0%">
      <stop offset="0%" stop-color="#286498"/>
      <stop offset="55%" stop-color="#5b84ab"/>
      <stop offset="100%" stop-color="#C49E30"/>
    </linearGradient>
    <linearGradient id="stemGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4c8a5a"/>
      <stop offset="100%" stop-color="#2f6b3d"/>
    </linearGradient>
    <filter id="haloBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.6"/>
    </filter>
    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.1"/>
    </filter>
  </defs>

  <!-- soft watercolor halo / bleed -->
  <path transform="translate(32,24) scale(1.18) translate(-32,-24)"
        d="M32,40 C19,40 12,29 14,19 C15,12 21,8 24,15 C26,9 32,6 32,15 C32,6 38,9 40,15 C43,8 49,12 50,19 C52,29 45,40 32,40 Z"
        fill="url(#tulipGrad)" opacity="0.30" filter="url(#haloBlur)"/>

  <!-- mid layer, slightly offset for a hand-painted double-wash look -->
  <path transform="translate(0.8,-0.6)"
        d="M32,40 C19,40 12,29 14,19 C15,12 21,8 24,15 C26,9 32,6 32,15 C32,6 38,9 40,15 C43,8 49,12 50,19 C52,29 45,40 32,40 Z"
        fill="url(#tulipGrad)" opacity="0.55" filter="url(#softBlur)"/>

  <!-- leaf -->
  <path d="M31,45 C22,44 14,48 11,55 C20,56 27,53 31,48 Z"
        fill="url(#stemGrad)" opacity="0.85"/>

  <!-- stem -->
  <path d="M32,39 C29,45 29,52 32,59" stroke="url(#stemGrad)" stroke-width="2.6"
        fill="none" stroke-linecap="round" opacity="0.9"/>

  <!-- crisp top petal shape -->
  <path d="M32,40 C19,40 12,29 14,19 C15,12 21,8 24,15 C26,9 32,6 32,15 C32,6 38,9 40,15 C43,8 49,12 50,19 C52,29 45,40 32,40 Z"
        fill="url(#tulipGrad)" opacity="0.95"/>

  <!-- subtle petal fold lines for painted detail -->
  <path d="M24,16 C24,24 27,32 32,38" stroke="#1f4c73" stroke-width="0.9" fill="none" opacity="0.25"/>
  <path d="M40,16 C40,24 37,32 32,38" stroke="#a9821f" stroke-width="0.9" fill="none" opacity="0.25"/>
</svg>
